  <rect x="520" y="105" width="96" height="34" class="btn"/>
  <text x="568" y="127" text-anchor="middle" class="btnText">新增阶段</text>
  <line x1="250" y1="155" x2="630" y2="155" class="line"/>
  <text x="260" y="190" class="td">需求分析与概要设计</text>
  <rect x="520" y="170" width="72" height="28" class="green"/>
  <text x="556" y="189" text-anchor="middle" class="muted">已结束</text>
  <text x="260" y="218" class="muted">时间：07-01 至 07-03，权重：20%</text>
  <line x1="250" y1="242" x2="630" y2="242" class="line"/>
  <text x="260" y="277" class="td">系统实现与联调</text>
  <rect x="520" y="257" width="72" height="28" class="orange"/>
  <text x="556" y="276" text-anchor="middle" class="muted">进行中</text>
  <text x="260" y="305" class="muted">时间：07-04 至 07-09，权重：50%</text>
  <line x1="250" y1="329" x2="630" y2="329" class="line"/>
  <text x="260" y="364" class="td">测试与答辩准备</text>
  <rect x="520" y="344" width="72" height="28" fill="#f8fafc" stroke="#cbd5e1" rx="4"/>
  <text x="556" y="363" text-anchor="middle" class="muted">未开始</text>
  <text x="260" y="392" class="muted">时间：07-10 至 07-12，权重：30%</text>

  <rect x="690" y="90" width="430" height="540" class="panel"/>
  <text x="720" y="130" class="head">过程评价</text>
  <text x="720" y="170" class="td">团队：第一小组</text>
  <text x="920" y="170" class="td">阶段完成度：2/3</text>
  <text x="720" y="205" class="td">已评价权重：70 / 100</text>
  <text x="920" y="205" class="td">加权过程得分：86.5</text>
  <line x1="710" y1="230" x2="1100" y2="230" class="line"/>
  <text x="720" y="265" class="td">文档质量</text>
  <rect x="830" y="244" width="80" height="34" fill="#fff" stroke="#d1d5db" rx="5"/>
  <text x="870" y="266" text-anchor="middle" class="td">88</text>
  <text x="720" y="315" class="td">完成度</text>
  <rect x="830" y="294" width="80" height="34" fill="#fff" stroke="#d1d5db" rx="5"/>
  <text x="870" y="316" text-anchor="middle" class="td">90</text>
  <text x="720" y="365" class="td">创新性</text>
  <rect x="830" y="344" width="80" height="34" fill="#fff" stroke="#d1d5db" rx="5"/>
  <text x="870" y="366" text-anchor="middle" class="td">84</text>
  <text x="720" y="415" class="td">技术难度</text>
  <rect x="830" y="394" width="80" height="34" fill="#fff" stroke="#d1d5db" rx="5"/>
  <text x="870" y="416" text-anchor="middle" class="td">86</text>
  <text x="720" y="465" class="td">教师反馈</text>
  <rect x="720" y="485" width="360" height="70" fill="#fff" stroke="#d1d5db" rx="5"/>
  <text x="735" y="512" class="muted">系统核心功能完成较好，建议补充测试说明。</text>
  <rect x="1000" y="575" width="80" height="34" class="btn"/>
  <text x="1040" y="597" text-anchor="middle" class="btnText">提交评价</text>
</svg>
