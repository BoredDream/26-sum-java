  <line x1="250" y1="150" x2="1120" y2="150" class="line"/>
  <text x="260" y="190" class="td">第一小组</text>
  <text x="390" y="190" class="td">2/3 阶段，86.5</text>
  <text x="555" y="190" class="td">13.0</text>
  <text x="675" y="190" class="td">14.0</text>
  <text x="790" y="190" class="td">43.2</text>
  <text x="905" y="190" class="td">18.0</text>
  <text x="1015" y="190" class="td">88.2</text>
  <line x1="250" y1="215" x2="1120" y2="215" class="line"/>
