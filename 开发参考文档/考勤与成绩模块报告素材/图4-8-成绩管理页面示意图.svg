<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <style>
    .title{font:700 28px "Microsoft YaHei",Arial;fill:#111827}
    .nav{fill:#2f4358}
    .navText{font:16px "Microsoft YaHei",Arial;fill:#dbeafe}
    .page{fill:#eef2f7}
    .panel{fill:#fff;stroke:#d1d5db;stroke-width:1.2;rx:8}
    .head{font:700 20px "Microsoft YaHei",Arial;fill:#111827}
    .th{font:700 15px "Microsoft YaHei",Arial;fill:#6b7280}
    .td{font:15px "Microsoft YaHei",Arial;fill:#374151}
    .line{stroke:#e5e7eb;stroke-width:1}
    .btn{fill:#409eff;rx:5}
    .btnText{font:700 14px "Microsoft YaHei",Arial;fill:#fff}
    .tag{fill:#fff7ed;stroke:#f59e0b;rx:4}
    .tagText{font:13px "Microsoft YaHei",Arial;fill:#b45309}
    .summary{fill:#eff6ff;stroke:#bfdbfe;rx:6}
  </style>
  <rect width="1200" height="720" fill="#fff"/>
