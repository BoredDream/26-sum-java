<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <style>
    .title{font:700 28px "Microsoft YaHei",Arial;fill:#111827}
    .nav{fill:#2f4358}
    .navText{font:16px "Microsoft YaHei",Arial;fill:#dbeafe}
    .page{fill:#eef2f7}
    .panel{fill:#fff;stroke:#d1d5db;stroke-width:1.2;rx:8}
    .head{font:700 20px "Microsoft YaHei",Arial;fill:#111827}
    .th{font:700 15px "Microsoft YaHei",Arial;fill:#6b7280}
    .td{font:15px "Microsoft YaHei",Arial;fill:#374151}
    .line{stroke:#e5e7eb;stroke-width:1}
    .btn{fill:#409eff;rx:5}
    .danger{fill:#f56c6c;rx:5}
    .btnText{font:700 14px "Microsoft YaHei",Arial;fill:#fff}
    .tag{fill:#fff7ed;stroke:#f59e0b;rx:4}
    .tagText{font:13px "Microsoft YaHei",Arial;fill:#b45309}
  </style>
  <rect width="1200" height="720" fill="#fff"/>
  <rect width="190" height="720" class="nav"/>
  <text x="34" y="48" class="navText" style="font-weight:700">综合实训选题系统</text>
  <text x="34" y="130" class="navText">签到任务</text>
  <text x="34" y="180" class="navText">考勤记录</text>
  <text x="34" y="230" class="navText">考勤统计</text>
  <text x="34" y="280" class="navText">补签审核</text>
  <text x="34" y="330" class="navText">成绩管理</text>
  <rect x="190" y="0" width="1010" height="720" class="page"/>
  <text x="230" y="50" class="title">补签审核</text>

  <rect x="230" y="90" width="910" height="70" class="panel"/>
  <text x="260" y="132" class="td">签到任务</text>
  <rect x="335" y="108" width="210" height="34" fill="#fff" stroke="#d1d5db" rx="5"/>
  <text x="350" y="130" class="td">第 3 周阶段签到</text>
  <text x="590" y="132" class="td">审核状态</text>
  <rect x="670" y="108" width="150" height="34" fill="#fff" stroke="#d1d5db" rx="5"/>
  <text x="690" y="130" class="td">待审核</text>
  <rect x="850" y="108" width="80" height="34" class="btn"/>
  <text x="890" y="130" text-anchor="middle" class="btnText">查询</text>

  <rect x="230" y="185" width="910" height="270" class="panel"/>
  <text x="260" y="223" class="th">学生</text>
  <text x="390" y="223" class="th">签到任务</text>
  <text x="585" y="223" class="th">补签原因</text>
  <text x="800" y="223" class="th">状态</text>
  <text x="960" y="223" class="th">操作</text>
  <line x1="250" y1="242" x2="1120" y2="242" class="line"/>
  <text x="260" y="280" class="td">张三</text>
  <text x="390" y="280" class="td">第 3 周阶段签到</text>
  <text x="585" y="280" class="td">设备故障，现场已参加实训</text>
  <rect x="790" y="260" width="70" height="28" class="tag"/>
  <text x="825" y="279" text-anchor="middle" class="tagText">待审核</text>
  <rect x="930" y="256" width="72" height="32" class="btn"/>
  <text x="966" y="277" text-anchor="middle" class="btnText">通过</text>
  <rect x="1010" y="256" width="72" height="32" class="danger"/>
  <text x="1046" y="277" text-anchor="middle" class="btnText">驳回</text>
  <line x1="250" y1="305" x2="1120" y2="305" class="line"/>
  <text x="260" y="345" class="td">李四</text>
  <text x="390" y="345" class="td">项目例会签到</text>
  <text x="585" y="345" class="td">请假后补交证明材料</text>
  <rect x="790" y="325" width="70" height="28" class="tag"/>
  <text x="825" y="344" text-anchor="middle" class="tagText">待审核</text>
  <rect x="930" y="321" width="72" height="32" class="btn"/>
  <text x="966" y="342" text-anchor="middle" class="btnText">通过</text>
  <rect x="1010" y="321" width="72" height="32" class="danger"/>
  <text x="1046" y="342" text-anchor="middle" class="btnText">驳回</text>

  <rect x="350" y="485" width="520" height="150" fill="#fff" stroke="#cbd5e1" stroke-width="2" rx="8"/>
  <text x="380" y="525" class="head">审核补签申请</text>
  <text x="380" y="560" class="td">补签原因：设备故障，现场已参加实训</text>
  <rect x="380" y="580" width="460" height="40" fill="#fff" stroke="#d1d5db" rx="5"/>
  <text x="395" y="605" class="td" fill="#9ca3af">填写审核意见</text>
  <rect x="660" y="640" width="80" height="34" class="btn"/>
  <text x="700" y="662" text-anchor="middle" class="btnText">确认</text>
</svg>
