<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .title{font:700 30px "Microsoft YaHei",Arial;fill:#111827}
      .actor{fill:#f1f5f9;stroke:#64748b;stroke-width:2}
      .actorText{font:700 18px "Microsoft YaHei",Arial;fill:#334155}
      .system{fill:#ffffff;stroke:#94a3b8;stroke-width:2;rx:12}
      .usecase{fill:#eff6ff;stroke:#2563eb;stroke-width:2}
      .core{fill:#ecfdf5;stroke:#059669;stroke-width:2}
      .support{fill:#fff7ed;stroke:#f97316;stroke-width:2}
      .text{font:16px "Microsoft YaHei",Arial;fill:#1f2937}
      .small{font:13px "Microsoft YaHei",Arial;fill:#64748b}
      .line{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:7 5;marker-end:url(#arrow)}
