  <path d="M1055 320 C1000 505 955 505 910 505" class="line"/>

  <path d="M525 295 C575 310 620 310 670 295" class="dash"/>
  <path d="M790 438 C760 560 710 605 745 610" class="dash"/>
  <path d="M410 543 C450 585 500 608 455 610" class="dash"/>
