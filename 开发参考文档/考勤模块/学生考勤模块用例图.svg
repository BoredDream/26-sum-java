<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1520" viewBox="0 0 1000 1520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 22px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #111; }
      .label { font: 14px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #111; }
      .small { font: 13px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #111; }
      .module { font: 700 16px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #111; }
      .usecase text { font: 15px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #fff; }
      .usecase ellipse { fill: #050505; stroke: #050505; stroke-width: 1.2; }
      .association { stroke: #111; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .include { stroke: #111; stroke-width: 1.2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .boundary { fill: #fff; stroke: #111; stroke-width: 1.4; }
      .actor-line { stroke: #111; stroke-width: 1.2; fill: none; }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1000" height="1520" fill="#fff"/>
  <text class="title" x="500" y="38" text-anchor="middle">学生考勤模块用例图</text>

