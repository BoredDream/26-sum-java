<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1650" viewBox="0 0 1200 1650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 24px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #111; }
      .label { font: 15px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #111; }
      .small { font: 13px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #111; }
      .module { font: 700 17px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #111; }
      .usecase text { font: 15px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #fff; }
      .usecase ellipse { fill: #050505; stroke: #050505; stroke-width: 1.2; }
      .association { stroke: #111; stroke-width: 1.35; fill: none; marker-end: url(#arrow); }
      .include { stroke: #111; stroke-width: 1.15; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .boundary { fill: #fff; stroke: #111; stroke-width: 1.5; }
      .actor-line { stroke: #111; stroke-width: 1.25; fill: none; }
      .note { fill: #fffbd6; stroke: #111; stroke-width: 1; }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1200" height="1650" fill="#fff"/>
  <text class="title" x="600" y="40" text-anchor="middle">成绩评价与过程监控模块总体用例图</text>

  <g>
    <path class="note" d="M110 62 H765 L790 87 V134 H110 Z"/>
    <path d="M765 62 V87 H790" fill="none" stroke="#111" stroke-width="1"/>
    <text class="small" x="130" y="88">阶段任务：任务名称、任务说明、开始时间、截止时间、提交要求、评分权重</text>
    <text class="small" x="130" y="112">成绩构成：平时成绩、阶段成绩、考勤成绩、综合成绩；最终成绩由教师确认</text>
  </g>

  <rect class="boundary" x="180" y="155" width="830" height="1335" rx="2"/>
  <text class="module" x="595" y="188" text-anchor="middle">成绩评价与过程监控管理模块</text>

