server:
  port: 8080

spring:
  application:
    name: training-selection-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/training_selection_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: your_password
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 通用文件上传目录
file:
  upload:
    dir: ./uploads

# 出题管理模块-文件上传目录
topic:
  file:
    upload-dir: ./uploads/topic

# 数据备份配置
backup:
  cron: "0 0 2 * * ?"
  dir: ./backup
  retention-days: 30

logging:
  level:
    com.training.system: debug
